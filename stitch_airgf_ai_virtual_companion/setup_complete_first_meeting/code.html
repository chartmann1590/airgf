<!-- Micro-interaction JS -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('sparkles-container');
            const numSparkles = 25;

            for (let i = 0; i < numSparkles; i++) {
                createSparkle(container);
            }
        });

        function createSparkle(container) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            
            // Random properties
            const size = Math.random() * 4 + 2; // 2px to 6px
            const left = Math.random() * 100; // 0% to 100% width
            const animationDuration = Math.random() * 5 + 3; // 3s to 8s
            const animationDelay = Math.random() * 5; // 0s to 5s delay

            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${left}%`;
            sparkle.style.bottom = `-10px`;
            sparkle.style.animationDuration = `${animationDuration}s`;
            sparkle.style.animationDelay = `${animationDelay}s`;

            // Optional: slight color variation
            if(Math.random() > 0.5) {
                sparkle.style.backgroundColor = 'var(--tw-colors-secondary)';
            }

            container.appendChild(sparkle);
            
            // Re-create after animation ends to keep it infinite but organic
            setTimeout(() => {
                sparkle.remove();
                createSparkle(container);
            }, (animationDuration + animationDelay) * 1000);
        }
    </script>
