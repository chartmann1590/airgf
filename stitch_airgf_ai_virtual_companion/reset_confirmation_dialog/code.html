<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background atmospheric glow to simulate the app underneath -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-secondary-container/20 via-background to-background pointer-events-none"></div>
<!-- Modal Overlay Backdrop (Frosted Glass) -->
<div class="fixed inset-0 bg-background/80 backdrop-blur-md z-40 transition-opacity duration-300"></div>
<!-- Modal Content -->
<div class="relative z-50 w-full max-w-[90%] md:max-w-md mx-auto px-container-margin">
<div class="bg-card-surface rounded-20dp p-lg shadow-[0px_8px_24px_rgba(74,45,110,0.4)] border border-outline-variant/30 glow-warning flex flex-col items-center text-center transform transition-all duration-300 scale-100 opacity-100">
<!-- Icon -->
<div class="w-16 h-16 rounded-full bg-error/10 flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-coral text-4xl" data-icon="warning" style="font-variation-settings: 'FILL' 1;">
                    warning
                </span>
</div>
<!-- Heading -->
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-sm">
                Reset Everything?
            </h2>
<!-- Body Text -->
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-2">
                This will delete all your conversations, her personality, and all customizations. She'll be gone forever. Are you sure?
            </p>
<!-- Actions -->
<div class="w-full flex flex-col md:flex-row gap-gutter">
<!-- Cancel Button (Outlined) -->
<button class="flex-1 py-3 px-6 rounded-full border border-secondary-container text-on-surface font-label-md text-label-md bg-transparent hover:bg-secondary-container/10 transition-colors active:scale-95">
                    Cancel
                </button>
<!-- Reset Button (Solid Coral) -->
<button class="flex-1 py-3 px-6 rounded-full bg-coral text-white font-label-md text-label-md shadow-lg hover:bg-coral/90 transition-colors active:scale-95">
                    Reset
                </button>
</div>
