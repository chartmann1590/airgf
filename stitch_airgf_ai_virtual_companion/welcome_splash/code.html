        }

        .btn-gradient {
            background: linear-gradient(90deg, #E91E8C 0%, #9C27B0 100%);

        /* Particle Animation Styles */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(233,30,140,0.4) 0%, rgba(233,30,140,0) 70%);
            border-radius: 50%;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
        
        .content-z {
            position: relative;
            z-index: 10;

<script>
        // Lightweight Particle System for Atmospheric Effect
        const particleContainer = document.getElementById('particles');
        const particleCount = 20;

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Random properties
            const size = Math.random() * 40 + 10;
            const left = Math.random() * 100;
            const duration = Math.random() * 10 + 15; // 15-25s
            const delay = Math.random() * 15;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;
            
            // Add subtle heart shape via CSS mask (optional, using radial for now as requested 'heart particles' conceptually)
            // Sticking to soft glowing orbs to fit the 'glassmorphism/ethereal' vibe better, but tinting them pink.
            
            particleContainer.appendChild(particle);
        }
    </script>
