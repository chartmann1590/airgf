<script>
        // Simple script to toggle spicy mode UI state
        document.getElementById('spicy-toggle').addEventListener('click', function() {
            this.classList.toggle('text-[#ff5722]');
            this.classList.toggle('text-outline');
            if(this.classList.contains('text-[#ff5722]')) {
                this.innerHTML = '<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: \'FILL\' 1;">local_fire_department</span>';
                this.classList.add('animate-pulse');
            } else {
                this.innerHTML = '<span class="material-symbols-outlined text-2xl">local_fire_department</span>';
                this.classList.remove('animate-pulse');
            }
        });

        // Hide scrollbars for cleaner UI but keep functionality
        const style = document.createElement('style');
        style.innerHTML = `
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        `;
        document.head.appendChild(style);
    </script>
