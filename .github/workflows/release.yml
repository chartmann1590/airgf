name: Build & Release APK

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine next version code
        id: version
        run: |
          CURRENT=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]\+')
          NEXT=$((CURRENT + 1))
          CURRENT_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -o '"[^"]*"' | tr -d '"')

          # Bump patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "current_code=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_code=$NEXT" >> $GITHUB_OUTPUT
          echo "version_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Bump version in build.gradle.kts
        run: |
          sed -i "s/versionCode = ${{ steps.version.outputs.current_code }}/versionCode = ${{ steps.version.outputs.next_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ steps.version.outputs.version_name }}\"/" app/build.gradle.kts

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} (code ${{ steps.version.outputs.next_code }})"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: AirGF v${{ steps.version.outputs.version_name }}
          body: |
            ## AirGF v${{ steps.version.outputs.version_name }}

            **Version Code:** ${{ steps.version.outputs.next_code }}

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/master) for details.

            ### Installation
            Download the APK below and install on your Android device (API 26+).
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
