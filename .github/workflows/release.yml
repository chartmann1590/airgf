name: Build & Release APK

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine next version
        id: version
        run: |
          version_code="$(date -u +'%y%j%H%M')"
          version_name="1.0.4.$(date -u +'%Y%m%d.%H%M')"
          echo "next_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "${GITHUB_WORKSPACE}/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.next_code }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: gradle assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Amoura v${{ steps.version.outputs.version_name }}
          body: |
            ## Amoura v${{ steps.version.outputs.version_name }}

            **Version Code:** ${{ steps.version.outputs.next_code }}

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/master) for details.

            ### Installation
            Download the APK below and install on your Android device (API 26+).
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
