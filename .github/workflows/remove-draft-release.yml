name: Remove Stray Draft Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "remove" to confirm removing draft release(s) from the production track'
        required: true
        default: ''

jobs:
  remove:
    if: ${{ github.event.inputs.confirm == 'remove' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Play Developer API client
        run: pip install --quiet google-api-python-client google-auth

      - name: Remove stray draft release(s)
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: python play-store/scripts/remove_draft_release.py
