name: Create Play Store Subscription

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "create" to confirm creating/activating the subscription'
        required: true
        default: ''

jobs:
  create:
    if: ${{ github.event.inputs.confirm == 'create' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Play Developer API client
        run: pip install --quiet google-api-python-client google-auth

      - name: Create and activate subscription
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: python play-store/scripts/create_subscription.py
