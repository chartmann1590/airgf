name: Publish to Google Play

on:
  workflow_dispatch:
    inputs:
      confirm_play_publish:
        description: 'Type "publish" to confirm submission to Google Play'
        required: true
        default: ''
      release_notes:
        description: 'Release notes (optional — commit messages used if omitted)'
        required: false
        default: ''

jobs:
  publish:
    if: ${{ github.event.inputs.confirm_play_publish == 'publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version codes
        id: version
        run: |
          version_code="$(date -u +'%y%j%H%M')"
          version_name="1.0.4.$(date -u +'%Y%m%d.%H%M')"
          echo "ANDROID_VERSION_CODE=${version_code}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_NAME=${version_name}" >> "${GITHUB_ENV}"
          echo "code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "name=${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Materialize google-services.json
        env:
          JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app
          echo "$JSON" > app/google-services.json

      - name: Materialize release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${GITHUB_WORKSPACE}/release.jks"

      - name: Generate Play Store release notes
        run: |
          mkdir -p distribution/whatsnew
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            echo "${{ github.event.inputs.release_notes }}" > distribution/whatsnew/whatsnew-en-US
          else
            prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$prev_tag" ]; then
              git log "$prev_tag"..HEAD --format="- %s" > distribution/whatsnew/whatsnew-en-US
            elif [ -f listing/whats_new.txt ]; then
              cp listing/whats_new.txt distribution/whatsnew/whatsnew-en-US
            else
              echo "Bug fixes and performance improvements." > distribution/whatsnew/whatsnew-en-US
            fi
          fi
          cat distribution/whatsnew/whatsnew-en-US

      - name: Run unit tests
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
          AIRGF_REPORT_ENDPOINT: ${{ secrets.AIRGF_REPORT_ENDPOINT }}
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: gradle testReleaseUnitTest --no-daemon

      - name: Run lint
        run: gradle lintRelease --no-daemon

      - name: Build Play release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
          AIRGF_REPORT_ENDPOINT: ${{ secrets.AIRGF_REPORT_ENDPOINT }}
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: gradle bundleRelease --no-daemon

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Verify Play service account secret
        run: |
          if [ -z "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not set"
            exit 1
          fi
          echo "Service account secret is present"

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.airgf.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt
